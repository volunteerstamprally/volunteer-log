<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加履歴</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
  background:#f5f5f5;
  padding-bottom:260px;
}

.card{
  background:white;
  border-radius:12px;
  padding:20px;
  width:92%;
  max-width:500px;
  margin:auto;
  box-sizing:border-box;
}

.history-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:10px;
  text-align:left;
}

.history-icon{
  font-size:28px;
}

.history-date{
  font-size:13px;
  color:#666;
}

.history-title{
  font-size:16px;
  font-weight:bold;
}

#historyCount{
  margin-bottom:20px;
  font-weight:bold;
  color:#06C755;
}

</style>

</head>

<body>

<!-- ローディング -->

<div id="loading" style="
padding-top:120px;
font-size:24px;
font-weight:bold;
text-align:center;
">

  <div>
    読み込み中<span id="dots">.</span>
  </div>

  <div style="
    width:300px;
    height:20px;
    background:#ddd;
    border-radius:10px;
    margin:20px auto;
    overflow:hidden;
  ">

    <div id="progressBar" style="
      width:0%;
      height:100%;
      background:#06C755;
      transition:0.3s;
    "></div>

  </div>

  <div id="progressText">
    0%
  </div>

</div>

<!-- メイン -->

<div
  class="card"
  id="mainCard"
  style="display:none;"
>

  <h2>📖 参加履歴</h2>

  <div id="historyCount"></div>

  <div id="historyArea"></div>

</div>

<script>

// ---------------------
// ローディングアニメ
// ---------------------

setInterval(()=>{

  const dots =
    document.getElementById("dots");

  if(!dots) return;

  if(dots.innerText === "."){
    dots.innerText = "..";
  }else if(dots.innerText === ".."){
    dots.innerText = "...";
  }else{
    dots.innerText = ".";
  }

},400);

// ---------------------

const LIFF_ID =
  "2010432453-r9aGOhcK";

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyCYHmsD-tkFKaURRlGjLQGpQ-RepnI_mRvmvPUiieIdgBaYd7WnaAMTxUqOagbDnAH/exec";

// ---------------------

function setProgress(percent,text=""){

  document.getElementById("progressBar")
    .style.width = percent + "%";

  document.getElementById("progressText")
    .innerText =
      percent + "%"
      + (text ? " ・" + text : "");

}

// ---------------------

async function init(){

  try{

    await liff.init({
      liffId: LIFF_ID
    });

    setProgress(20,"LINEログイン");

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const friendship =
      await liff.getFriendship();

    if(!friendship.friendFlag){

      document.body.innerHTML = `
        <div style="padding:40px;text-align:center;">

          <h2>
            まずは友だち追加してください
          </h2>

          <a
            href="https://lin.ee/w3gYAY3"
            target="_blank"
            style="
              display:inline-block;
              margin-top:20px;
              padding:15px 30px;
              background:#06C755;
              color:white;
              border-radius:12px;
              text-decoration:none;
            "
          >
            友だち追加する
          </a>

        </div>
      `;

      return;
    }

    const profile =
      await liff.getProfile();

    const userId =
      profile.userId;

    console.log("userId:",userId);

    setProgress(50,"履歴取得");

    const res =
      await fetch(
        GAS_URL
        + "?mode=history"
        + "&userId="
        + encodeURIComponent(userId)
      );

    const data =
      await res.json();

    console.log(data);

    const history =
      data.history || [];

    setProgress(80,"画面作成");

    document.getElementById(
      "historyCount"
    ).innerHTML =
      `🎯 合計参加回数：${history.length}回`;

    const area =
      document.getElementById(
        "historyArea"
      );

    area.innerHTML = "";

    if(history.length === 0){

      area.innerHTML = `
        <div style="
          color:#888;
          padding:20px;
        ">
          参加履歴はありません
        </div>
      `;

    }else{

      history.forEach(item=>{

        area.innerHTML += `
          <div class="history-item">

            <div class="history-icon">
              🌱
            </div>

            <div>

              <div class="history-date">
                取得日：
                ${item.date.substring(0,10)}
              </div>

              <div class="history-title">
                ${item.spot}
              </div>

            </div>

          </div>
        `;

      });

    }

    setProgress(100,"完了");

    await new Promise(
      r=>setTimeout(r,500)
    );

    document.getElementById("loading")
      .style.display="none";

    document.getElementById("mainCard")
      .style.display="block";

  }catch(err){

    console.error(err);

    alert(
      "エラーが発生しました\n\n"
      + err
    );

  }

}

init();

</script>

</body>
</html>
