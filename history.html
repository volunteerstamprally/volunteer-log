<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加履歴</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    max-width:500px;
    margin:auto;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-top:0;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    border-bottom:2px solid #ddd;
    padding:12px 5px;
}

td{
    padding:12px 5px;
    border-bottom:1px solid #eee;
}

.total{
    margin-top:20px;
    text-align:right;
    font-weight:bold;
}

.loading{
    text-align:center;
    margin-top:80px;
    font-size:20px;
}

.empty{
    text-align:center;
    color:#777;
    padding:30px;
}
</style>

</head>

<body>

<div class="loading" id="loading">
読み込み中...
</div>

<div class="card" id="main" style="display:none;">

<h2>📖 参加履歴</h2>

<table>
<thead>
<tr>
<th>📅 取得日</th>
<th>📍 活動名</th>
</tr>
</thead>

<tbody id="historyBody">
</tbody>

</table>

<div class="total" id="total"></div>

</div>

<script>

const LIFF_ID="2010432453-r9aGOhcK";
const GAS_URL="https://script.google.com/macros/s/AKfycbyCYHmsD-tkFKaURRlGjLQGpQ-RepnI_mRvmvPUiieIdgBaYd7WnaAMTxUqOagbDnAH/exec";

async function init(){

    await liff.init({
        liffId:LIFF_ID
    });

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const friendship=await liff.getFriendship();

    if(!friendship.friendFlag){

        document.body.innerHTML=`
        <div style="padding:40px;text-align:center;">
            <h2>まずは友だち追加してください</h2>

            <a
              href="https://lin.ee/w3gYAY3"
              target="_blank"
              style="
                display:inline-block;
                margin-top:20px;
                padding:15px 30px;
                background:#06C755;
                color:white;
                border-radius:12px;
                text-decoration:none;
              "
            >
              友だち追加する
            </a>
        </div>
        `;

        return;

    }

    const profile=await liff.getProfile();

    const userId=profile.userId;

    const res=await fetch(
        `${GAS_URL}?mode=history&userId=${encodeURIComponent(userId)}`
    );

    const data=await res.json();

    const tbody=document.getElementById("historyBody");

    if(!data.history || data.history.length===0){

        tbody.innerHTML=`
        <tr>
            <td colspan="2" class="empty">
                参加履歴はありません
            </td>
        </tr>
        `;

    }else{

        data.history.forEach(h=>{

            tbody.innerHTML+=`
            <tr>
                <td>${h.date.substring(0,10)}</td>
                <td>${h.spot}</td>
            </tr>
            `;

        });

    }

    document.getElementById("total").innerHTML=
        `🎯 合計参加回数：${data.history.length}回`;

    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="block";

}

init();

</script>

</body>
</html>
